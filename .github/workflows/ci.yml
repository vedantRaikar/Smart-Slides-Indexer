name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install black ruff mypy isort
          
      - name: Check black formatting
        run: black --check .
        
      - name: Check ruff
        run: ruff check .
        
      - name: Check isort
        run: isort --check-only --diff .
        
      - name: Type check with mypy
        run: mypy . --ignore-missing-imports --no-error-summary

  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          
      - name: Run tests
        run: pytest tests/ -v --cov=core --cov=workers --cov=api --cov=src --cov-report=xml --cov-fail-under=80
        
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.api
          push: false
          tags: smart-slides-indexer/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.worker
          push: false
          tags: smart-slides-indexer/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-compose-test:
    name: Docker Compose Test
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build images
        run: |
          docker compose -f infra/docker-compose.yml build
          
      - name: Start services
        run: |
          docker compose -f infra/docker-compose.yml up -d
          
      - name: Wait for API
        run: |
          sleep 10
          curl -f http://localhost:8000/health || exit 1
          
      - name: Stop services
        run: |
          docker compose -f infra/docker-compose.yml down

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [docker-compose-test]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.api
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smart-slides-api:latest
          
      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.worker
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smart-slides-worker:latest
